version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@vitejs/*"
          - "@testing-library/*"
          - "msw"
          - "@playwright/test"
          - "playwright"
          - "jsdom"
    labels: ["dependencies"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels: ["dependencies", "ci"]
