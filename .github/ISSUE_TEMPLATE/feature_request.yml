name: Feature request
description: Suggest a change that serves the core learning loop
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What's the user-visible pain you're trying to relieve? Avoid jumping straight to a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This serves the "one song a week + Sunday quiz" loop, not a tangential feature.
          required: true
