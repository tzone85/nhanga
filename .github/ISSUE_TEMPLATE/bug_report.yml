name: Bug report
description: Something is wrong in Nhanga
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: request-id
    attributes:
      label: x-request-id (if from an API response)
  - type: input
    id: env
    attributes:
      label: Browser / device
      placeholder: "iOS Safari 17.4 / Chrome 130 / ..."
