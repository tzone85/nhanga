<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <style>
      .bg{ fill:#f6efe2; }
      .ink{ fill:#1f1d1c; }
      .muted{ fill:#5a564f; }
      .life{ stroke:#1f1d1c; stroke-width:1; stroke-dasharray:4 3; }
      .msg { stroke:#1f1d1c; stroke-width:1.4; fill:none; }
      .rmsg{ stroke:#8c8884; stroke-width:1.2; fill:none; stroke-dasharray:5 3; }
      .actor{ fill:#fef3df; stroke:#1f1d1c; }
      .infra{ fill:#fce0d4; stroke:#1f1d1c; }
      .app  { fill:#fde6c9; stroke:#1f1d1c; }
      .label{ fill:#1f1d1c; font-size:12px; }
      .h{ font-weight:700; font-size:13px; }
      .title{ font-weight:700; font-size:18px; }
      .note { fill:#e7f0ee; stroke:#2e6f8c; stroke-width:1; }
      .pass { fill:#e9f0db; stroke:#4f6b35; stroke-width:1; }
      .fail { fill:#fadfd6; stroke:#8c3a26; stroke-width:1; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1d1c"/>
    </marker>
    <marker id="ah-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c8884"/>
    </marker>
  </defs>

  <rect class="bg" width="1000" height="720"/>
  <text x="40" y="38" class="title ink">Sequence — Sunday 09:00 SAST quiz</text>
  <text x="40" y="58" class="muted">Cron picks the week's song, notifies, you take the quiz, SRS schedules next reviews.</text>

  <!-- lanes -->
  <g>
    <rect x="40"  y="80" width="130" height="34" rx="6" class="infra"/><text x="105" y="102" text-anchor="middle" class="h ink">Vercel Cron</text>
    <rect x="190" y="80" width="170" height="34" rx="6" class="app"/><text x="275" y="102" text-anchor="middle" class="h ink">pickWeeklySong</text>
    <rect x="380" y="80" width="130" height="34" rx="6" class="infra"/><text x="445" y="102" text-anchor="middle" class="h ink">ProgressStore (KV)</text>
    <rect x="530" y="80" width="120" height="34" rx="6" class="infra"/><text x="590" y="102" text-anchor="middle" class="h ink">Web Push</text>
    <rect x="670" y="80" width="140" height="34" rx="6" class="actor"/><text x="740" y="102" text-anchor="middle" class="h ink">You (iPhone)</text>
    <rect x="830" y="80" width="140" height="34" rx="6" class="app"/><text x="900" y="102" text-anchor="middle" class="h ink">runQuiz · SRS</text>
  </g>

  <!-- lifelines -->
  <line x1="105" y1="114" x2="105" y2="680" class="life"/>
  <line x1="275" y1="114" x2="275" y2="680" class="life"/>
  <line x1="445" y1="114" x2="445" y2="680" class="life"/>
  <line x1="590" y1="114" x2="590" y2="680" class="life"/>
  <line x1="740" y1="114" x2="740" y2="680" class="life"/>
  <line x1="900" y1="114" x2="900" y2="680" class="life"/>

  <!-- 1. cron fires -->
  <line x1="105" y1="150" x2="273" y2="150" class="msg" marker-end="url(#ah)"/>
  <text x="110" y="144" class="label">1. cron `0 7 * * 0` → pickWeeklySong()</text>

  <!-- 2. read songs+attempts -->
  <line x1="275" y1="184" x2="443" y2="184" class="msg" marker-end="url(#ah)"/>
  <text x="280" y="178" class="label">2. read songs + recent attempts</text>
  <line x1="445" y1="216" x2="277" y2="216" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="280" y="210" class="muted">3. song list + scores</text>

  <!-- 4. choose -->
  <rect x="200" y="232" width="170" height="36" rx="6" class="note"/>
  <text x="285" y="255" text-anchor="middle" class="ink">unseen FIFO else weakest score</text>

  <!-- 5. create lesson -->
  <line x1="275" y1="296" x2="443" y2="296" class="msg" marker-end="url(#ah)"/>
  <text x="280" y="290" class="label">5. createLesson(weekIso, songId)</text>

  <!-- 6. notify -->
  <line x1="275" y1="330" x2="588" y2="330" class="msg" marker-end="url(#ah)"/>
  <text x="280" y="324" class="label">6. notify("Today's Nhanga: Ndakuvara")</text>

  <line x1="590" y1="364" x2="738" y2="364" class="msg" marker-end="url(#ah)"/>
  <text x="595" y="358" class="label">7. push notification arrives</text>

  <!-- 8. tap -->
  <line x1="740" y1="398" x2="898" y2="398" class="msg" marker-end="url(#ah)"/>
  <text x="745" y="392" class="label">8. tap → deep-link /quiz/[lessonId]</text>

  <!-- 9. assemble items -->
  <rect x="830" y="414" width="160" height="50" rx="6" class="note"/>
  <text x="910" y="434" text-anchor="middle" class="ink">9. assemble 10 items:</text>
  <text x="910" y="450" text-anchor="middle" class="muted">6 from song · 4 SRS-due</text>

  <!-- 10. user answers loop -->
  <line x1="740" y1="492" x2="898" y2="492" class="msg" marker-end="url(#ah)"/>
  <text x="745" y="486" class="label">10. answer each item  (cloze · match · translate · listen · morpheme)</text>

  <line x1="900" y1="524" x2="742" y2="524" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="745" y="518" class="muted">11. per-item ✓/✗ feedback</text>

  <!-- 12. score -->
  <rect x="830" y="540" width="160" height="50" rx="6" class="note"/>
  <text x="910" y="560" text-anchor="middle" class="ink">12. score = correct / total</text>
  <text x="910" y="576" text-anchor="middle" class="muted">SRS.schedule each card</text>

  <!-- 13a. pass branch -->
  <rect x="40"  y="612" width="450" height="60" rx="8" class="pass"/>
  <text x="56" y="634" class="h ink">PASS · score ≥ 0.80</text>
  <text x="56" y="654" class="ink">lesson.passed = true · intervals stretch · next due-dates pushed out</text>

  <!-- 13b. fail branch -->
  <rect x="510" y="612" width="450" height="60" rx="8" class="fail"/>
  <text x="526" y="634" class="h ink">FAIL · score &lt; 0.80</text>
  <text x="526" y="654" class="ink">missed cards reset to interval=1 · same song repeats next Sunday</text>
</svg>
