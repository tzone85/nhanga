<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Inter, system-ui, sans-serif" font-size="12">
  <defs>
    <style>
      .bg{ fill:#f6efe2; }
      .ink{ fill:#1f1d1c; }
      .muted{ fill:#5a564f; }
      .lane{ fill:#ffffff; stroke:#1f1d1c; stroke-width:1.2; }
      .life{ stroke:#1f1d1c; stroke-width:1; stroke-dasharray:4 3; }
      .msg { stroke:#1f1d1c; stroke-width:1.4; fill:none; }
      .rmsg{ stroke:#8c8884; stroke-width:1.2; fill:none; stroke-dasharray:5 3; }
      .actor{ fill:#fef3df; stroke:#1f1d1c; }
      .infra{ fill:#fce0d4; stroke:#1f1d1c; }
      .app  { fill:#fde6c9; stroke:#1f1d1c; }
      .label{ fill:#1f1d1c; font-size:12px; }
      .h{ font-weight:700; font-size:13px; }
      .title{ font-weight:700; font-size:18px; }
      .note { fill:#fff8e7; stroke:#d99749; stroke-width:1; }
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f1d1c"/>
    </marker>
    <marker id="ah-dim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#8c8884"/>
    </marker>
  </defs>

  <rect class="bg" width="1000" height="720"/>
  <text x="40" y="38" class="title ink">Sequence — YouTube Share Sheet → translated, refined, saved</text>
  <text x="40" y="58" class="muted">Primary lyrics-ingestion flow on iPhone. Adapters implement Ports; Application orchestrates.</text>

  <!-- lanes -->
  <g>
    <rect x="60"  y="80" width="120" height="34" rx="6" class="actor"/><text x="120" y="102" text-anchor="middle" class="h ink">You (iPhone)</text>
    <rect x="200" y="80" width="120" height="34" rx="6" class="actor"/><text x="260" y="102" text-anchor="middle" class="h ink">YouTube app</text>
    <rect x="340" y="80" width="140" height="34" rx="6" class="app"/><text x="410" y="102" text-anchor="middle" class="h ink">Nhanga PWA · /share</text>
    <rect x="500" y="80" width="140" height="34" rx="6" class="app"/><text x="570" y="102" text-anchor="middle" class="h ink">addSong use-case</text>
    <rect x="660" y="80" width="140" height="34" rx="6" class="infra"/><text x="730" y="102" text-anchor="middle" class="h ink">VideoAdapter / LyricsSource</text>
    <rect x="820" y="80" width="140" height="34" rx="6" class="infra"/><text x="890" y="102" text-anchor="middle" class="h ink">Translator + KV</text>
  </g>

  <!-- lifelines -->
  <line x1="120" y1="114" x2="120" y2="680" class="life"/>
  <line x1="260" y1="114" x2="260" y2="680" class="life"/>
  <line x1="410" y1="114" x2="410" y2="680" class="life"/>
  <line x1="570" y1="114" x2="570" y2="680" class="life"/>
  <line x1="730" y1="114" x2="730" y2="680" class="life"/>
  <line x1="890" y1="114" x2="890" y2="680" class="life"/>

  <!-- 1. tap share -->
  <line x1="120" y1="150" x2="258" y2="150" class="msg" marker-end="url(#ah)"/>
  <text x="125" y="144" class="label">1. tap Share on a Shona video</text>

  <!-- 2. iOS share_target invoke -->
  <line x1="260" y1="180" x2="408" y2="180" class="msg" marker-end="url(#ah)"/>
  <text x="265" y="174" class="label">2. iOS dispatches via share_target → opens PWA at /share</text>

  <!-- 3. forward to use-case -->
  <line x1="410" y1="218" x2="568" y2="218" class="msg" marker-end="url(#ah)"/>
  <text x="415" y="212" class="label">3. addSong({ url, title? })</text>

  <!-- 4. fetch metadata + lyrics in parallel -->
  <line x1="570" y1="252" x2="728" y2="252" class="msg" marker-end="url(#ah)"/>
  <text x="575" y="246" class="label">4. fetchMetadata(url) + LyricsSource.fetch(title, artist)</text>

  <line x1="730" y1="284" x2="572" y2="284" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="575" y="278" class="muted">5. { title, artist, thumb } + lyrics (may be empty)</text>

  <!-- 6. translator -->
  <line x1="570" y1="320" x2="888" y2="320" class="msg" marker-end="url(#ah)"/>
  <text x="575" y="314" class="label">6. Translator.draftTranslation(shonaLyrics)  ⇢  via Vercel AI Gateway</text>

  <line x1="890" y1="356" x2="572" y2="356" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="575" y="350" class="muted">7. lines[] with glosses (confidence: draft)</text>

  <!-- 8. return to UI -->
  <line x1="570" y1="392" x2="412" y2="392" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="415" y="386" class="muted">8. draft Song { lines: [...] }</text>

  <!-- 9. user refines -->
  <line x1="120" y1="430" x2="408" y2="430" class="msg" marker-end="url(#ah)"/>
  <text x="125" y="424" class="label">9. you edit a line / split morphemes / fix gloss</text>

  <!-- 10. refineLine -->
  <line x1="410" y1="466" x2="568" y2="466" class="msg" marker-end="url(#ah)"/>
  <text x="415" y="460" class="label">10. refineLine(songId, lineIndex, patch)</text>

  <!-- 11. persist -->
  <line x1="570" y1="500" x2="888" y2="500" class="msg" marker-end="url(#ah)"/>
  <text x="575" y="494" class="label">11. ProgressStore.upsertSong(song) → KV  (confidence: refined)</text>

  <line x1="890" y1="534" x2="572" y2="534" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="575" y="528" class="muted">12. ack</text>

  <line x1="570" y1="568" x2="412" y2="568" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="415" y="562" class="muted">13. line saved · UI shows ✓</text>

  <line x1="410" y1="602" x2="122" y2="602" class="rmsg" marker-end="url(#ah-dim)"/>
  <text x="125" y="596" class="muted">14. progress dot turns green; you continue</text>

  <!-- Note about cross-device sync -->
  <g transform="translate(60,640)">
    <rect width="900" height="48" rx="8" class="note"/>
    <text x="16" y="22" class="ink h">Sync</text>
    <text x="16" y="40" class="ink">Mac opens /learn next morning → reads same KV record → same refined translation appears. No device-local divergence.</text>
  </g>
</svg>
